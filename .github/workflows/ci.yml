name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check tools
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: ripgrep
          version: "1.0"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python sources
        run: |
          python -m py_compile main.py build_plugin.py
          find core -name '*.py' -print0 | xargs -0 python -m py_compile

      - name: Check removed reference package stays absent
        run: |
          ! rg -n "chatgpt_accounts|ChatGPT Accounts|chatgpt" \
            -g '!AGENTS.md' \
            -g '!docs/superpowers/**' \
            -g '!examples/**'

      - name: Build plugin artifact
        run: python build_plugin.py

      - name: Add commit SHA to artifact filename
        run: mv dist/manual_actions.py "dist/manual_actions-${GITHUB_SHA}.py"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: manual_actions-${{ github.sha }}.py
          path: dist/manual_actions-${{ github.sha }}.py
          if-no-files-found: error

  release:
    name: Publish pre-release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: manual_actions-${{ github.sha }}.py
          path: release

      - name: Prepare release metadata
        id: release
        shell: bash
        run: |
          set -euo pipefail

          git fetch --force --tags

          next_tag="$(
            python - <<'PY'
          import ast
          from pathlib import Path

          tree = ast.parse(Path("core/constants.py").read_text(encoding="utf-8"))
          for node in tree.body:
              if not isinstance(node, ast.Assign):
                  continue
              if not any(isinstance(target, ast.Name) and target.id == "VERSION" for target in node.targets):
                  continue
              if isinstance(node.value, ast.Constant) and isinstance(node.value.value, str):
                  print(node.value.value)
                  break
          else:
              raise SystemExit("VERSION not found in core/constants.py")
          PY
          )"

          if git rev-parse -q --verify "refs/tags/$next_tag" >/dev/null; then
            echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag="$(
            git tag --list '*.*.*' \
              | awk '/^[0-9]+\.[0-9]+\.[0-9]+$/ { print }' \
              | sort -V \
              | tail -n 1
          )"
          if [[ -z "$latest_tag" ]]; then
            commit_range="${{ github.sha }}"
          else
            commit_range="${latest_tag}..${{ github.sha }}"
          fi

          {
            echo "Release notes"
            echo
            git log --format='%H%x09%s' "$commit_range" | while IFS=$'\t' read -r commit subject; do
              subject="${subject//\\/\\\\}"
              subject="${subject//[/\\[}"
              subject="${subject//]/\\]}"
              printf -- '- [%s](https://github.com/${{ github.repository }}/commit/%s)\n' "$subject" "$commit"
            done
          } > release-notes.md

          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish pre-release
        if: steps.release.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            "release/manual_actions-${{ github.sha }}.py" \
            --title "V${{ steps.release.outputs.tag }}" \
            --notes-file release-notes.md \
            --prerelease \
            --target "${{ github.sha }}"

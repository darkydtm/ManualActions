name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install check tools
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: ripgrep
          version: "1.0"

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python sources
        run: |
          python -m py_compile main.py build_plugin.py
          find core -name '*.py' -print0 | xargs -0 python -m py_compile

      - name: Validate project source
        run: python tools/validate_project.py

      - name: Check removed reference package stays absent
        run: |
          ! rg -n "chatgpt_accounts|ChatGPT Accounts" \
            -g '!AGENTS.md' \
            -g '!docs/superpowers/**' \
            -g '!examples/**'

      - name: Build plugin artifact
        run: python build_plugin.py

      - name: Add commit SHA to artifact filename
        run: mv dist/manual_actions.py "dist/manual_actions-${GITHUB_SHA}.py"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: manual_actions-${{ github.sha }}.py
          path: dist/manual_actions-${{ github.sha }}.py
          if-no-files-found: error

  release:
    name: Publish pre-release
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare release metadata
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git fetch --force --tags

          current_tag="$(
            python - <<'PY'
          import ast
          from pathlib import Path

          tree = ast.parse(Path("core/config/constants.py").read_text(encoding="utf-8"))
          for node in tree.body:
              if not isinstance(node, ast.Assign):
                  continue
              if not any(isinstance(target, ast.Name) and target.id == "VERSION" for target in node.targets):
                  continue
              if isinstance(node.value, ast.Constant) and isinstance(node.value.value, str):
                  print(node.value.value)
                  break
          else:
              raise SystemExit("VERSION not found in core/constants.py")
          PY
          )"
          next_tag="$current_tag"

          version_exists() {
            gh release view "$1" >/dev/null 2>&1 || git rev-parse --verify --quiet "refs/tags/$1" >/dev/null
          }

          while version_exists "$next_tag"; do
            next_tag="$(
              python - "$next_tag" <<'PY'
          import re
          import sys

          version = sys.argv[1]
          match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", version)
          if not match:
              raise SystemExit(f"Cannot bump non-semver VERSION: {version}")

          major, minor, patch = (int(part) for part in match.groups())
          print(f"{major}.{minor}.{patch + 1}")
          PY
            )"
          done

          target_sha="${{ github.sha }}"
          if [[ "$next_tag" != "$current_tag" ]]; then
            python - "$next_tag" <<'PY'
          import ast
          import sys
          from pathlib import Path

          next_version = sys.argv[1]
          path = Path("core/config/constants.py")
          source = path.read_text(encoding="utf-8")
          tree = ast.parse(source)
          lines = source.splitlines()

          for node in tree.body:
              if not isinstance(node, ast.Assign):
                  continue
              if not any(isinstance(target, ast.Name) and target.id == "VERSION" for target in node.targets):
                  continue
              lines[node.lineno - 1] = f'VERSION = "{next_version}"'
              path.write_text("\n".join(lines) + "\n", encoding="utf-8")
              break
          else:
              raise SystemExit("VERSION not found in core/constants.py")
          PY

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add core/config/constants.py
            git commit -m "chore bump plugin version to $next_tag"
            git push origin "HEAD:main"
            target_sha="$(git rev-parse HEAD)"
          fi

          latest_tag="$(
            git tag --list '*.*.*' \
              | awk -v next_tag="$next_tag" '/^[0-9]+\.[0-9]+\.[0-9]+$/ && $0 != next_tag { print }' \
              | sort -V \
              | tail -n 1
          )"
          if [[ -z "$latest_tag" ]]; then
            commit_range="${{ github.sha }}"
          else
            commit_range="${latest_tag}..${{ github.sha }}"
          fi

          {
            echo "Release notes"
            echo
            git log --format='%H%x09%s' "$commit_range" | while IFS=$'\t' read -r commit subject; do
              subject="${subject//\\/\\\\}"
              subject="${subject//[/\\[}"
              subject="${subject//]/\\]}"
              printf -- '- [%s](https://github.com/${{ github.repository }}/commit/%s)\n' "$subject" "$commit"
            done
          } > release-notes.md

          echo "tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "target=$target_sha" >> "$GITHUB_OUTPUT"

      - name: Build plugin artifact
        if: steps.release.outputs.publish == 'true'
        run: |
          python build_plugin.py
          mkdir -p release
          mv dist/manual_actions.py "release/manual_actions-${{ steps.release.outputs.target }}.py"

      - name: Publish pre-release
        if: steps.release.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            "release/manual_actions-${{ steps.release.outputs.target }}.py" \
            --title "V${{ steps.release.outputs.tag }}" \
            --notes-file release-notes.md \
            --prerelease \
            --target "${{ steps.release.outputs.target }}"
